<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator - WebServe Tools</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        nav {
            background: #1e293b;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }

        .tool-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            margin-top: 20px;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 80px;
            border-radius: 5px;
            border: none;
            text-align: center;
        }

        button {
            padding: 12px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

            button:hover {
                background: #0ea5e9;
            }

        .result {
            margin-top: 15px;
            font-size: 20px;
            color: #38bdf8;
        }
    </style>

</head>
<body>

    <nav>
        WebServe Tools
    </nav>

    <div class="container">
        <h1>Age Calculator</h1>
        <p>Enter your birth date</p>

        <div class="tool-box">
            <input type="number" id="day" placeholder="Day">
            <input type="number" id="month" placeholder="Month">
            <input type="number" id="year" placeholder="Year">
            <br>
            <button onclick="calculateAge()">Calculate Age</button>

            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        function calculateAge() {
            let day = document.getElementById("day").value;
            let month = document.getElementById("month").value;
            let year = document.getElementById("year").value;

            if (day == "" || month == "" || year == "") {
                document.getElementById("result").innerText = "Please enter full date";
                return;
            }

            let birth = new Date(year, month - 1, day);
            let today = new Date();

            let age = today.getFullYear() - birth.getFullYear();
            let m = today.getMonth() - birth.getMonth();

            if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
                age--;
            }

            document.getElementById("result").innerText = "Your age is " + age + " years";
        }
    </script>

</body>
</html>
