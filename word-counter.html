<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter - WebServe Tools</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

nav {
    background: #1e293b;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

.tool-box {
    background: #1e293b;
    padding: 30px;
    border-radius: 10px;
    margin-top: 20px;
}

textarea {
    width: 100%;
    height: 180px;
    padding: 10px;
    border-radius: 5px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
}

.stats {
    margin-top: 15px;
    font-size: 18px;
    color: #38bdf8;
}
</style>

</head>
<body>

<nav>
    WebServe Tools
</nav>

<div class="container">
    <h1>Word Counter</h1>
    <p>Count words, characters and sentences.</p>

    <div class="tool-box">
        <textarea id="text" placeholder="Type or paste your text here..." oninput="countText()"></textarea>

        <div class="stats">
            Words: <span id="words">0</span><br>
            Characters: <span id="chars">0</span><br>
            Sentences: <span id="sentences">0</span>
        </div>
    </div>
</div>

<script>
function countText() {
    let text = document.getElementById("text").value;

    // Words
    let words = text.trim().split(/\s+/).filter(word => word.length > 0);
    let wordCount = words.length;

    // Characters
    let charCount = text.length;

    // Sentences
    let sentenceCount = text.split(/[.!?]+/).filter(s => s.trim().length > 0).length;

    document.getElementById("words").innerText = wordCount;
    document.getElementById("chars").innerText = charCount;
    document.getElementById("sentences").innerText = sentenceCount;
}
</script>

</body>
</html>
