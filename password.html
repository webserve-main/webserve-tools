<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - WebServe Tools</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        nav {
            background: #1e293b;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        .tool-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }

        input {
            padding: 12px;
            width: 200px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

            button:hover {
                background: #0ea5e9;
            }

        .result {
            margin-top: 15px;
            font-size: 20px;
            color: #38bdf8;
            word-break: break-all;
        }
    </style>

</head>
<body>

    <nav>
        WebServe Tools
    </nav>

    <div class="container">
        <h1>Password Generator</h1>
        <p>Click generate to create a secure password.</p>

        <div class="tool-box">
            <input type="number" id="length" placeholder="Password length" value="12">
            <br>
            <button id="generateBtn">Generate Password</button>
            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        document.getElementById("generateBtn").addEventListener("click", function () {

            let length = document.getElementById("length").value;
            let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%";
            let password = "";

            for (let i = 0; i < length; i++) {
                password += chars[Math.floor(Math.random() * chars.length)];
            }

            document.getElementById("result").innerText = password;
        });
    </script>

</body>
</html>
