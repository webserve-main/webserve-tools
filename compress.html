<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor - WebServe Tools</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        nav {
            background: #1e293b;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        .tool-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }

        input {
            padding: 12px;
            width: 80%;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

            button:hover {
                background: #0ea5e9;
            }

        img {
            max-width: 100%;
            margin-top: 15px;
        }

        #downloadBtn {
            display: none;
            margin-top: 10px;
        }
    </style>

</head>
<body>

    <nav>
        WebServe Tools
    </nav>

    <div class="container">
        <h1>Image Compressor</h1>
        <p>Enter image URL and compress it.</p>

        <div class="tool-box">
            <input type="text" id="imageUrl" placeholder="Enter image URL">
            <br>
            <button onclick="compressImage()">Compress Image</button>

            <div>
                <canvas id="canvas" style="display:none;"></canvas>
                <img id="preview">
            </div>

            <a id="downloadBtn">
                <button>Download Compressed Image</button>
            </a>
        </div>
    </div>

    <script>
        function compressImage() {
            let url = document.getElementById("imageUrl").value;

            let img = new Image();
            img.crossOrigin = "anonymous";
            img.src = url;

            img.onload = function () {
                let canvas = document.getElementById("canvas");
                let ctx = canvas.getContext("2d");

                let width = img.width * 0.5;
                let height = img.height * 0.5;

                canvas.width = width;
                canvas.height = height;

                ctx.drawImage(img, 0, 0, width, height);

                let compressed = canvas.toDataURL("image/jpeg", 0.7);

                document.getElementById("preview").src = compressed;

                let downloadBtn = document.getElementById("downloadBtn");
                downloadBtn.href = compressed;
                downloadBtn.download = "compressed.jpg";
                downloadBtn.style.display = "inline-block";
            }
        }
    </script>

</body>
</html>
